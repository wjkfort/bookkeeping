name = "bookkeeping-backend"
main = "src/index.ts"
compatibility_date = "2024-02-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "bookkeeping-db"
database_id = "81d99dfc-618f-408f-8e28-d2752a807d45"

# AI binding
[ai]
binding = "AI"

# Environment variables
[vars]
EXCHANGE_RATE_CACHE_HOURS = "24"

# Secrets (set via: wrangler secret put OPEN_EXCHANGE_RATES_API_KEY)
# OPEN_EXCHANGE_RATES_API_KEY = "your_key_here"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# CORS configuration
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
