name = "bookkeeping-backend"
main = "src/index.ts"
compatibility_date = "2024-02-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "bookkeeping-db"
database_id = "" # Will be filled after creating D1 database

# Environment variables
[vars]
EXCHANGE_RATE_CACHE_HOURS = "24"

# Secrets (set via: wrangler secret put OPEN_EXCHANGE_RATES_API_KEY)
# OPEN_EXCHANGE_RATES_API_KEY = "your_key_here"

# CORS configuration
[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }
